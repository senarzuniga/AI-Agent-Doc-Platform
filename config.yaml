app:
  title: "AI-Agent-Doc-Platform"
  debug: false
  output_dir: "outputs"

model:
  provider: "openai"
  name: "gpt-4o-mini"
  max_tokens: 4096
  temperature: 0.7

agents:
  research:
    name: "Research Agent"
    description: "Gathers facts, data, and context for the document topic"
    max_tokens: 2048
    temperature: 0.3
  writing:
    name: "Writing Agent"
    description: "Drafts structured, professional document content"
    max_tokens: 4096
    temperature: 0.7
  review:
    name: "Review Agent"
    description: "Reviews, improves, and finalizes document quality"
    max_tokens: 2048
    temperature: 0.4

orchestrator:
  max_retries: 3
  retry_delay: 2
