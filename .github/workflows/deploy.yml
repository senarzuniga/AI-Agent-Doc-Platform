name: Deploy to Streamlit Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports
        run: python -c "import app.main"
        env:
          OPENAI_API_KEY: dummy  # structural check only

      - name: Deployment notice
        run: |
          echo "✅ Build verified. Deploy via Streamlit Cloud:"
          echo "   https://share.streamlit.io/new → connect this repo → app/main.py"
